name: Manual CV Update

on:
  workflow_dispatch: 

jobs:
  update-cv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Site Repo
        uses: actions/checkout@v4
        with:
          # Usiamo il token standard per gestire la repo del sito
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download CV from Private Repo
        run: |
          # Usiamo l'API di GitHub con il Secret per scaricare il CV
          curl -H "Authorization: token ${{ secrets.CV_REPO_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/samubiscaro/CV_Biscaro/contents/CV_Biscaro.pdf" \
               -o public/CV_Biscaro.pdf
          
          if [ -f "public/CV_Biscaro.pdf" ]; then
            echo "PDF scaricato con successo."
          else
            echo "Errore nel download del PDF."
            exit 1
          fi

      - name: Update Last Revised Date
        run: |
          CURRENT_DATE=$(date +"%B %Y")
          # Il comando cerca 'Last revised:' seguito da qualsiasi mese e anno e lo aggiorna
          sed -i "s/Last revised: [A-Za-z]\+ [0-9]\{4\}/Last revised: $CURRENT_DATE/g" src/pages/cv.astro
          echo "Data aggiornata a $CURRENT_DATE"

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/CV_Biscaro.pdf src/pages/cv.astro
          git commit -m "Manual CV Sync: $(date +'%Y-%m-%d')" || echo "Nessuna modifica rilevata"
          git push
